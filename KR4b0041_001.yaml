body:
  text: 卷一鼓吹鐃歌十五首朱路篇朱路揚和鸞翠蓋耀金華玄牡飾樊纓流旌拂飛霞雄戟闢曠塗班劍翼高車三軍且莫喧聽我奏鐃歌清鞞驚短簫朗鼓節鳴笳人心惟愷豫茲音亮且和輕風起紅塵渟瀾發微波逸韻騰天路穨響結城阿仁聲被八表威震振九遐嗟嗟介胄士勗哉念皇家宋書樂志樂府詩集十九廣文選十二詩紀四十五思悲公篇思悲公懷袞衣東國何悲公西歸公西歸流二叔幼主既悟偃禾復偃禾復聖志申營都新邑從斯民從斯民德惟明制禮作樂興頌聲興頌聲致嘉祥鳴鳳爰集萬國康萬國康猶弗已握髮吐餐下群士惟我君繼伊周親睹盛世復何求同上雍離篇雍士多離心荊民懷怨情二凶不量德搆難稱其兵王人銜朝命正辭糾不庭上宰宣九伐萬里舉長旌樓船掩江濆駟介飛重英歸德戒後夫賈勇尚先鳴逆徒既不濟愚智亦相傾霜鋒未及染鄢郢忽已清西川無潛鱗北渚有奔鯨凌威致天府一戰夷三城江漢被美化宇宙歌太平惟我東郡民曾是深推誠宋書樂志樂府詩集十九詩紀四十五戰城南篇戰城南衝黃塵丹旌電烻鼓雷震勍敵猛戎馬殷橫陳亘野若屯雲仗大順應三靈義之所感士忘生長劍擊繁弱鳴飛鏑炫晃亂奔星虎騎躍華眊旋朱火延起騰飛煙驍雄斬高旗搴長角浮叫響清天夷群寇殪逆徒餘黎霑惠詠來蘇奏愷樂歸皇都班爵獻俘邦國娛同上巫山高篇巫山高三峽峻青壁千尋深谷萬仞崇巖冠靈林冥冥山禽夜響晨猿相和鳴洪波迅澓載逝載停悽悽商旅之客懷苦情在昔陽九皇綱微李氏竊命宣武耀靈威蠢爾逆縱復踐亂機王旅薄伐傳首來至京師古之為國惟德是貴力戰而虐民鮮不顛墜矧乃叛戾伊胡能遂咨爾巴子無放肆同上上陵者篇上陵者相追攀被服纖麗振綺紈攜童幼升崇巒南望城闕鬱盤桓王公第通衢端高甍華屋列朱軒臨濬谷掇秋蘭士女悠奕映隰原指營丘感牛山爽鳩既沒景君歎嗟歲聿逝不還志氣衰沮玄鬢斑野莽宿墳土乾顧此纍纍中心酸生必死亦何怨取樂今日展情歡同上將進酒將進酒慶三朝備繁禮薦嘉肴榮枯換霜霧交緩春帶命朋僚車等旗馬齊鑣懷溫克樂林濠士失志慍情勞思旨酒寄遊遨敗德人甘醇醪耽長夜惑淫妖興屢舞厲哇謠形傞傞聲號呶首既濡志亦荒性命夭國家亡嗟後生節酣觴匪酒辜孰為殃宋書樂志樂府詩集十九廣文選十二詩紀四十五君馬篇君馬麗且間揚鑣騰逸姿駿足躡流景高步追輕飛冉冉六轡柔奕奕金華暉輕霄翼羽蓋長風靡淑旗願為范氏驅雍容步中畿豈效詭遇子馳騁趣危機鉛陵策良駟造父為之悲不怨吳坂峻但恨伯樂稀赦彼岐山盜實濟韓原師奈何漢魏主縱情營所私疲民甘藜藿廄馬患盈肥人畜眢厥養蒼生將焉歸宋書樂志樂府詩集十九詩紀四十五芳樹篇芳樹生北庭豐隆正徘徊翠穎陵冬秀紅葩迎春開佳人間幽室惠心婉以諧蘭房掩綺幌緑草被長階日夕遊雲際歸禽命同棲皓月盈素景涼風拂中閨哀絃理虛堂要妙清且淒嘯歌流激楚傷此碩人懷梁塵集丹帷微飆揚羅袿豈怨嘉時暮徒惜良願乖同上有所思篇有所思思昔人曾閔二子善養親和顏色奉昏晨至誠蒸蒸通明神鄒孟軻為齊卿稱身受祿不貪榮道不用獨擁楹三徙既誶禮義明飛鳥集猛獸附功成事畢乃更娶哀我生遘凶閔幼罹荼酷備艱辛慈顏絶見無因長懷永思託丘墳同上雉子遊原澤篇雉子遊原澤幼懷耿介心飲啄雖勤苦不願棲園林古有避世士抗志青霄岑浩然寄卜肆揮棹通川陰逍遙風塵外散髮撫鳴琴卿相非所眄何況於千金功名豈不美寵辱亦相尋冰炭結六府憂虞纏胸襟當世須大度量己不克任三復泉流誡自警良已深同上上邪篇上邪下難正衆枉不可矯音和響必清端景緣直表大化揚仁風齊人猶偃草聖王既已沒誰能弘至道開春湛柔露代終肅嚴霜承平貴孔孟政弊侯申商孝公明賞罰六世猶克昌李斯肆濫刑秦民所以亡漢宣隆中興魏祖寧三方譬彼針與石效疾而稱良行葦非不厚悠悠何詎央琴瑟時未調改絃當更張矧乃治天下此要安可忘宋書樂志樂府詩集十九廣文選十二詩紀四十五臨高臺篇臨高臺望天衢飄然輕舉陵太虛攜列子超帝鄉雲衣雨帶乘風翔肅龍駕會瑤臺清暉浮景溢蓬萊濟西海濯洧盤佇立雲嶽結幽蘭馳迅風遊炎州願言桑梓思舊遊傾霄蓋靡電旌降彼天塗穨窈冥辭仙族歸人群懷忠抱義奉明君任窮達隨所遭何為遠想令心勞同上遠期篇遠期千里客肅駕候良辰近命城郭友具爾惟懿親高門啓雙闈長筵列嘉賓中唐儛六佾三廂羅樂人簫管激悲音羽毛揚華文金石響高宇絃歌動梁塵修標多巧捷丸劍亦入神遷善自雅調成化由清均主人垂隆慶群士樂亡身願我聖明君遐期保萬春宋書樂志樂府詩集十九詩紀四十五石流篇石上流水湔湔其波發源幽岫永歸長河瞻彼逝者歲月其偕子在川上惟以增懷嗟我殷憂載勞寤寐遘此百罹有志不遂行年倏忽長勤是嬰永言沒世悼茲無成幸遇開泰沐浴嘉運綏帶安寢亦又何慍古之為仁自求諸己虛情遙慕終於徒已宋書樂志樂府詩集十九廣文選十二詩紀四十五
